<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ccsim 客服端 — npm</title>
    <link rel="stylesheet" href="common.css" />
  </head>
  <body>
    <div class="container">
      <h1>Ccsim 客服端 <span class="badge">npm</span></h1>

      <div class="card">
        <h2>连接状态 <span class="step-count" id="connStepLabel">-</span></h2>
        <div class="stats">
          <div class="stat">
            <div class="num purple" id="statAgentId">-</div>
            <div class="label">agentId</div>
          </div>
          <div class="stat">
            <div class="num blue" id="statConnId">-</div>
            <div class="label">connId</div>
          </div>
          <div class="stat">
            <div class="num" id="statOnlineStatus">-</div>
            <div class="label">在线</div>
          </div>
        </div>
        <ul class="test-list">
          <li>
            <span class="label">1. WebSocket 连接</span
            ><span class="status status-wait" id="t1">等待</span>
          </li>
          <li>
            <span class="label">2. 认证成功 (auth_ok)</span
            ><span class="status status-wait" id="t2">等待</span>
          </li>
          <li>
            <span class="label">3. SDK 就绪 (allSet)</span
            ><span class="status status-wait" id="t3">等待</span>
          </li>
          <li>
            <span class="label">4. 自动上班已发送</span
            ><span class="status status-wait" id="t4">等待</span>
          </li>
          <li>
            <span class="label">5. 会话列表已拉取</span
            ><span class="status status-wait" id="t5">等待</span>
          </li>
        </ul>
        <div class="summary-bar">
          <span class="item"
            ><span class="dot dot-green"></span> <span id="testPass">0</span> 通过</span
          >
          <span class="item"
            ><span class="dot dot-red"></span> <span id="testFail">0</span> 失败</span
          >
          <span class="item"
            ><span class="dot dot-gray"></span> <span id="testTotal">5</span> 总计</span
          >
        </div>
        <div class="row">
          <button class="btn btn-default" id="btnToggleOnline">上班/下班</button>
        </div>
      </div>

      <div class="card full-width">
        <h2>事件日志</h2>
        <div class="log" id="logEl"><div class="t-debug">等待连接...</div></div>
      </div>

      <div class="card full-width" style="font-size: 12px; color: #999">
        <strong>加载方式：</strong><code>import { AgentSDK } from '@chihqiang/ccsim-ui'</code>（需
        <code>npm run dev</code>）
      </div>
    </div>

    <script src="common.js"></script>
    <script type="module">
      import { AgentSDK, CcsimError } from '../src/index.ts'

      const btnToggleOnline = document.getElementById('btnToggleOnline')

      window.ExampleUtils.init({ testIds: ['t1', 't2', 't3', 't4', 't5'] })
      const { log, setTestStatus, updateConnInfo } = window.ExampleUtils

      log('创建 Agent SDK 实例...', 'debug')

      const sdk = new AgentSDK({
        tenant_no: 'test',
        account: 'admin',
        password: 'admin123',
        wsHost: 'ws://localhost:8080/ws',
        debug: true,
      })

      setTestStatus('t1', 'progress')
      updateConnInfo('statOnlineStatus', '连接中')

      sdk.on('allSet', () => {
        log('allSet — SDK 初始化完成', 'info')
        setTestStatus('t2', 'pass')
        setTestStatus('t3', 'pass')
        updateConnInfo('statAgentId', sdk.agentId || '-')
        updateConnInfo('statConnId', sdk.getStore()?.connId || '-')
        document.getElementById('connStepLabel').textContent = '✓ 就绪'
      })

      sdk.on('agentStatus', (onlineCount, hasOnlineAgent) => {
        log(`agentStatus: online=${onlineCount}, hasOnline=${hasOnlineAgent}`, 'event')
        updateConnInfo('statOnlineStatus', hasOnlineAgent ? '在线' : '离线')
        const el = document.getElementById('statOnlineStatus')
        if (el) el.style.color = hasOnlineAgent ? '#52c41a' : '#999'
        if (hasOnlineAgent) setTestStatus('t4', 'pass')
      })

      sdk.on('error', (err) => {
        const msg = err instanceof CcsimError ? err.toEvent() : (err?.message ?? String(err))
        log('错误: ' + msg, 'error')
      })

      sdk.on('messageError', (error) => {
        log('消息发送失败: ' + error, 'error')
      })

      sdk.on('disconnected', (code, reason) => {
        log(`连接断开: code=${code}, reason=${reason}`, 'warn')
        document.getElementById('connStepLabel').textContent = '✗ 断开'
        updateConnInfo('statOnlineStatus', '离线')
      })

      sdk.on('reconnecting', (attempt, max) => {
        log(`重连中: ${attempt}/${max}`, 'warn')
      })

      sdk.on('sessionListUpdated', () => {
        log('会话列表已刷新', 'event')
        setTestStatus('t5', 'pass')
      })

      btnToggleOnline.addEventListener('click', () => {
        if (!sdk.connected) {
          log('未连接', 'warn')
          return
        }
        const isOnline = sdk.getStore()?.isAgentOnline ?? false
        isOnline ? sdk.setAgentOffline() : sdk.setAgentOnline()
        log(isOnline ? '手动下班' : '手动上班', 'event')
      })

      let connCheckInterval = setInterval(() => {
        if (sdk.connected && !window.ExampleUtils.tests.t1.passed) {
          setTestStatus('t1', 'pass')
          log('WebSocket 已连接', 'info')
        }
      }, 300)
      sdk.on('allSet', () => {
        if (connCheckInterval) {
          clearInterval(connCheckInterval)
          connCheckInterval = null
        }
      })

      log('SDK 已创建，正在自动连接并上班...', 'info')
      log('账号: admin / admin123', 'debug')
    </script>
  </body>
</html>
